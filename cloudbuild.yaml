# ─────────────────────────────────────────────────────────────────────────────
# cloudbuild.yaml — Google Cloud Build pipeline
#
# Triggered manually:  gcloud builds submit --config cloudbuild.yaml
# Triggered on push:   set up a Cloud Build trigger pointing to this file
#
# Substitutions (override via --substitutions=_REGION=...,_SA_EMAIL=...):
#   _REGION   — GCP region for Cloud Run and Artifact Registry
#   _IMAGE    — Docker image / Artifact Registry repo name
#   _JOB_NAME — Cloud Run Job name
#   _SA_EMAIL — Service account email that the Cloud Run Job runs as
# ─────────────────────────────────────────────────────────────────────────────

substitutions:
  _REGION:   asia-southeast1
  _IMAGE:    idss-pipeline
  _JOB_NAME: idss-pipeline-job
  _SA_EMAIL: idss-pipeline-sa@PROJECT_ID_PLACEHOLDER.iam.gserviceaccount.com

steps:
  # ── 1. Build Docker image ──────────────────────────────────────────────────
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - $_REGION-docker.pkg.dev/$PROJECT_ID/$_IMAGE/$_IMAGE:$COMMIT_SHA
      - -t
      - $_REGION-docker.pkg.dev/$PROJECT_ID/$_IMAGE/$_IMAGE:latest
      - .

  # ── 2. Push to Artifact Registry ──────────────────────────────────────────
  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - $_REGION-docker.pkg.dev/$PROJECT_ID/$_IMAGE/$_IMAGE

  # ── 3. Deploy / update Cloud Run Job ──────────────────────────────────────
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - jobs
      - deploy
      - $_JOB_NAME
      - --image=$_REGION-docker.pkg.dev/$PROJECT_ID/$_IMAGE/$_IMAGE:$COMMIT_SHA
      - --region=$_REGION
      - --service-account=$_SA_EMAIL          # runs as this SA (has secret access)
      - --task-timeout=3600
      - --max-retries=1
      - --set-secrets=GMAIL_TOKEN_JSON=gmail-token-json:latest
      - --set-secrets=SERVICE_ACCOUNT_JSON=service-account-json:latest
      - --set-secrets=ANTHROPIC_API_KEY=anthropic-api-key:latest
      - --set-env-vars=DRIVE_FOLDER_ID=1O00CGI9zSzsbGK4S_n3bTAehJ-TUcvrX
      - --set-env-vars=WEBAPP_URL=https://script.google.com/macros/s/AKfycbzH2cXnuP8AVeMSrJKGqI0iHqjSZ90SdbbNWsNDsBIr1oDb-XTys-M8n1wpU_oMjnX6/exec

images:
  - $_REGION-docker.pkg.dev/$PROJECT_ID/$_IMAGE/$_IMAGE:$COMMIT_SHA
  - $_REGION-docker.pkg.dev/$PROJECT_ID/$_IMAGE/$_IMAGE:latest

options:
  logging: CLOUD_LOGGING_ONLY
